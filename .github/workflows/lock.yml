name: 'Lock Inactive Threads'

on:
  schedule:
    - cron: '0 12 * * *'  # Run daily at 12:00 UTC

permissions:
  issues: write
  pull-requests: write

jobs:
  lock:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/lock-threads@v5
        with:
          issue-inactive-days: 365
          pr-inactive-days: 365
          issue-comment: >
            This issue has been automatically locked because it has not had
            recent activity. Please open a new issue for related bugs or questions.
          pr-comment: >
            This pull request has been automatically locked because it has not had
            recent activity. Please open a new pull request for related changes.
          log-output: true