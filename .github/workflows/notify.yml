name: Notify

on:
  issues:
    types: [opened, closed, reopened]
  pull_request:
    types: [opened, closed, reopened, review_requested]
  release:
    types: [published]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send notification to Discord
        uses: Ilshidur/action-discord@0.3.2
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        with:
          args: |
            **Event:** ${{ github.event_name }}
            **Repository:** ${{ github.repository }}
            **Action:** ${{ github.event.action }}
            **Actor:** ${{ github.actor }}
            **Details:** ${{ github.event.issue.title || github.event.pull_request.title || github.event.release.name }}
            **URL:** ${{ github.event.issue.html_url || github.event.pull_request.html_url || github.event.release.html_url }}